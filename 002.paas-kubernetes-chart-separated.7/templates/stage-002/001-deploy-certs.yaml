---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "{{ .Values.global.clusterName }}-pki-admin-client"
  namespace: {{ .Values.global.namespace }}
spec:
  commonName: "kubernetes-super-admin"
  secretName: "{{ .Values.global.clusterName }}-pki-admin-client"
  duration: {{ .Values.global.crtDuration }}
  renewBefore: {{ .Values.global.crtRenewBefore }}
  subject:
    organizations:
    - "system:masters"
  privateKey:
    algorithm: ECDSA
  usages:
  - "signing"
  - "key encipherment"
  - "client auth"
  issuerRef:
    name: "{{ .Values.global.clusterName }}-issuer"
    kind: Issuer
{{- end }}
