  renewBefore: {{ .Values.global.crtRenewBefore }}
  subject:
    organizations:
    - "system:masters"
  privateKey:
    algorithm: ECDSA
  usages:
  - "signing"
  - "key encipherment"
  - "client auth"
  issuerRef:
    name: "{{ .Values.global.clusterName }}-front-proxy-issuer"
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "{{ .Values.global.clusterName }}-pki-konnectivity-server-client"
  namespace: {{ .Values.global.namespace }}
spec:
  commonName: "system:konnectivity-server"
  secretName: "{{ .Values.global.clusterName }}-pki-konnectivity-server-client"
  duration: {{ .Values.global.agentDuration }}
  renewBefore: {{ .Values.global.agentRenewBefore }}
  subject:
