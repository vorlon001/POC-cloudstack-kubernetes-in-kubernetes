{{- if .Values.stage003 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.global.clusterName }}-konnectivity-egress-selector-configuration
  namespace: {{ .Values.global.namespace }}
data:
  egress-selector-configuration.yaml: |
    apiVersion: apiserver.k8s.io/v1beta1
    egressSelections:
    - connection:
        proxyProtocol: GRPC
        transport:
          uds:
            udsName: /run/konnectivity/konnectivity-server.socket
      name: cluster
    kind: EgressSelectorConfiguration
{{- end }}
