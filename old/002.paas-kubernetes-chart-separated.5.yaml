              readOnly: true
      volumes:
        - name: scheduler-kubeconfig
          configMap:
            name: paas-one-scheduler-kubeconfig
            defaultMode: 420
        - name: etc-kubernetes-pki
          projected:
            defaultMode: 420
            sources:
              - secret:
                  name: paas-one-pki-ca
                  items:
                    - key: tls.crt
                      path: ca.crt
                    - key: tls.key
                      path: ca.key
              - secret:
                  name: paas-one-pki-scheduler-client
                  items:
                    - key: tls.crt
                      path: scheduler.crt
                    - key: tls.key
                      path: scheduler.key
